<script>
(function() {
  var adContainers = document.querySelectorAll('.ad-inarticle ins.adsbygoogle, .ad-leaderboard ins.adsbygoogle, .ad-halfpage ins.adsbygoogle');
  if (!('IntersectionObserver' in window)) {
    Array.from(adContainers).forEach(function(ad) {
      (adsbygoogle = window.adsbygoogle || []).push({});
    });
    return;
  }
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var ad = entry.target;
        (adsbygoogle = window.adsbygoogle || []).push({});
        observer.unobserve(ad);
      }
    });
  }, { rootMargin: '200px 0px' });
  Array.from(adContainers).forEach(function(ad) {
    observer.observe(ad);
  });
})();
</script>
